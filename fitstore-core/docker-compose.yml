services:
  postgres:
    image: postgres:16
    container_name: fitstore-postgres
    environment:
      POSTGRES_USER: fitstore
      POSTGRES_PASSWORD: fitstore
      POSTGRES_DB: fitstore
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: fitstore-redis
    ports:
      - "6379:6379"
volumes:
  postgres_data: